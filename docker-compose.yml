services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lineage-db
    environment:
      POSTGRES_USER: lineage
      POSTGRES_PASSWORD: lineage
      POSTGRES_DB: lineage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineage -d lineage"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
