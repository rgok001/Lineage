# Render Blueprint: the trace worker's permanent home.
#
# One background worker, one persistent disk. The worker polls trace_requests
# for owner-approved jobs and runs the pipeline (see worker/run.py); the disk
# holds DATA_DIR (fetched papers, extracted text, exports) and the embedding
# model cache, both of which must outlive restarts.
#
# Secrets are sync:false — Render asks for them in the dashboard on first
# deploy; they are never committed:
#   DATABASE_URL       Neon DIRECT (unpooled) connection string. The pooled
#                      endpoint is for the serverless app; this worker holds
#                      one long-lived connection.
#   ANTHROPIC_API_KEY  pays for stages B, C (labels) and D
#   OPENALEX_MAILTO    contact email for the OpenAlex polite pool

services:
  - type: worker
    name: lineage-worker
    runtime: python
    # 'standard' = 2 GB RAM / 1 CPU. This was needed when embeddings ran on a
    # local model (bge-large peaked >2 GB at load and OOM-killed 'starter').
    # Embeddings are now the Voyage hosted API (no model in memory), so the
    # worker's footprint is ~250 MB and 'starter' (512 MB) would suffice —
    # downgrade to save cost once a Voyage run is confirmed. Kept at 'standard'
    # for now for safety. For a blueprint service this line is authoritative.
    plan: standard
    buildCommand: pip install -r pipeline/requirements.txt
    startCommand: python worker/run.py
    disk:
      name: lineage-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATA_DIR
        value: /data
      - key: PROMPT_VERSION
        value: v2
      - key: LLM_MODEL
        value: claude-sonnet-5
      - key: VOYAGE_MODEL
        value: voyage-3
      - key: TRACE_SPEND_CAP_USD
        value: "15"
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: OPENALEX_MAILTO
        sync: false
